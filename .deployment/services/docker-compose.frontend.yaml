# APP_STAND
#
# FRONTEND_VERSION_TAG
# FRONTEND_DOMAIN
#

networks:
  qliqy-network:
    name: qliqy-network
    external: true
  traefik-network:
    name: traefik-network
    external: true

x-logging: &formatted-logging
  driver: json-file
  options:
    tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"
    max-size: "10m"
    max-file: "3"
    mode: "non-blocking"
    max-buffer-size: "4m"

x-common-env: &common-envs
  APP_STAND: ${APP_STAND:-prod}

services:
  frontend:
    container_name: frontend
    image: ghcr.io/qliqyservice/frontend:${FRONTEND_VERSION_TAG:-latest}
    restart: always
    logging: *formatted-logging
    environment:
      <<: [*common-envs]
    labels:
      - traefik.enable=true
      - traefik.http.services.frontend.loadbalancer.server.port=80
      - traefik.http.services.frontend.loadbalancer.passhostheader=true
      - traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN}`) && PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=https
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=le-${APP_STAND}
    networks: [ qliqy-network, traefik-network ]
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
